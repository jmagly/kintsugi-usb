# --- Schema reference ---
#
# Per entry:
#   slug              (str, required)  — canonical identifier for this model
#   runtime           (enum, required) — "ollama" | "llama-cpp"
#   source            (enum, required) — "ollama" | "huggingface" | "url"
#   quant             (str, optional)  — quantization marker, e.g. Q4_K_M
#   sha256            (str, optional)  — required if source==url; recommended if source==huggingface
#   hf_repo           (str, conditional) — required if source==huggingface
#   hf_file           (str, conditional) — required if source==huggingface
#   url               (str, conditional) — required if source==url
#   approx_download_gb (num, optional) — display-only
#   approx_resident_gb (num, optional) — display-only; used for storage warn/refuse math
#   purpose           (str, required)
#   tested_on         (list[str], optional) — fleet host names or environment descriptors
#   status            (enum, required) — "recommended" | "evaluating" | "deprecated"
#   license_note      (str, optional)
#   notes             (str, optional)
